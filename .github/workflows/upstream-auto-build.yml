name: Upstream Auto Build

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if upstream has no new release"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: upstream-auto-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}

      - name: Decide whether to build
        id: check
        shell: bash
        env:
          API_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/wxxsfxyzm/InstallerX-Revived.git || true
          git fetch upstream --tags --force
          git fetch origin main

          RELEASES_JSON_FILE="$(mktemp)"
          RELEASE_META_FILE="$(mktemp)"
          curl -fsSL \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${API_TOKEN}" \
            'https://api.github.com/repos/wxxsfxyzm/InstallerX-Revived/releases?per_page=20' \
            -o "${RELEASES_JSON_FILE}"
          python3 - "${RELEASES_JSON_FILE}" "${RELEASE_META_FILE}" <<'PY'
          import json
          import shlex
          import sys
          from pathlib import Path

          releases = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          candidates = [release for release in releases if not release.get("draft")]
          if not candidates:
              raise SystemExit("No non-draft upstream release found from GitHub API response.")

          def sort_key(release):
              return release.get("published_at") or release.get("created_at") or ""

          latest = max(candidates, key=sort_key)
          release_id = latest.get("id")
          release_tag = (latest.get("tag_name") or "").strip()
          release_name = (latest.get("name") or "").replace("\r", " ").replace("\n", " ").strip()
          release_url = (latest.get("html_url") or "").strip()

          if not release_id:
              raise SystemExit("Missing release id from GitHub API response.")
          if not release_tag:
              raise SystemExit("Missing release tag_name from GitHub API response.")
          if not release_url:
              raise SystemExit("Missing release html_url from GitHub API response.")

          meta = {
              "UP_RELEASE_ID": str(release_id),
              "UP_RELEASE_TAG": release_tag,
              "UP_RELEASE_NAME": release_name,
              "UP_RELEASE_URL": release_url,
          }
          with Path(sys.argv[2]).open("w", encoding="utf-8") as fh:
              for key, value in meta.items():
                  fh.write(f"{key}={shlex.quote(value)}\n")
          PY
          . "${RELEASE_META_FILE}"
          UP_SHA="$(git rev-list -n 1 "$UP_RELEASE_TAG")"
          BUILD_RELEASE_TAG="auto-build-release-${UP_RELEASE_ID}"
          EXPECTED_APK_NAME="InstallerX-${UP_SHA}.apk"
          PREVIEW_VERSION_NAME="$(date -u +'%y.%m').${UP_SHA:0:7}"

          EXISTING_BUILD_JSON_FILE="$(mktemp)"
          if curl -fsSL \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${API_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${BUILD_RELEASE_TAG}" \
            -o "${EXISTING_BUILD_JSON_FILE}" 2>/dev/null; then
            BUILD_RELEASE_PRESENT=true
          else
            BUILD_RELEASE_PRESENT=false
          fi

          ASSET_ALREADY_PUBLISHED=false
          if [[ "$BUILD_RELEASE_PRESENT" == "true" ]]; then
            ASSET_ALREADY_PUBLISHED="$(python3 - "${EXISTING_BUILD_JSON_FILE}" "${EXPECTED_APK_NAME}" <<'PY'
            import json
            import sys
            from pathlib import Path

            data = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
            expected = sys.argv[2]
            asset_names = {asset.get("name", "") for asset in data.get("assets", [])}
            print("true" if expected in asset_names else "false")
            PY
            )"
          fi

          CHANGED=true
          if [[ "$ASSET_ALREADY_PUBLISHED" == "true" ]]; then
            CHANGED=false
          fi
          FORCE="${{ github.event.inputs.force_build || 'false' }}"
          SHOULD_BUILD="$CHANGED"
          if [[ "$FORCE" == "true" ]]; then
            SHOULD_BUILD=true
          fi

          echo "up_sha=$UP_SHA" >> "$GITHUB_OUTPUT"
          echo "up_release_id=$UP_RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "up_release_tag=$UP_RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "up_release_name=$UP_RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "up_release_url=$UP_RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "build_release_tag=$BUILD_RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "expected_apk_name=$EXPECTED_APK_NAME" >> "$GITHUB_OUTPUT"
          echo "build_release_present=$BUILD_RELEASE_PRESENT" >> "$GITHUB_OUTPUT"
          echo "asset_already_published=$ASSET_ALREADY_PUBLISHED" >> "$GITHUB_OUTPUT"
          echo "preview_version_name=$PREVIEW_VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "force=$FORCE" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

      - name: Skip summary
        if: steps.check.outputs.should_build != 'true'
        run: |
          echo "Build release ${{ steps.check.outputs.build_release_tag }} already contains ${{ steps.check.outputs.expected_apk_name }}. Skip build."

      - name: Sync auto-build branch from upstream
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B auto-build "${{ steps.check.outputs.up_sha }}"

      - name: Apply your custom files from origin/main
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail

          CUSTOM_PATHS=(
            "apply-local-fix.ps1"
            "app/src/main/ic_launcher-playstore.png"
            "app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml"
            "app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml"
            "app/src/main/res/mipmap-hdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-hdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-hdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-mdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-mdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-mdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-xhdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-xhdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-xxhdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-xxhdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-xxxhdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.webp"
            "app/src/main/res/values/ic_launcher_background.xml"
          )

          for p in "${CUSTOM_PATHS[@]}"; do
            if git cat-file -e "origin/main:$p" 2>/dev/null; then
              mkdir -p "$(dirname "$p")"
              git checkout origin/main -- "$p"
            fi
          done

          for p in \
            "app/src/main/res/mipmap-anydpi/ic_launcher.xml" \
            "app/src/main/res/mipmap-anydpi/ic_launcher_round.xml"; do
            if ! git cat-file -e "origin/main:$p" 2>/dev/null; then
              git rm -f --ignore-unmatch "$p" || true
            fi
          done

          # Keep upstream strings.xml (to avoid missing newly added keys),
          # but preserve your custom app_name from origin/main.
          python3 - <<'PY'
          import pathlib
          import re
          import subprocess

          app_name = ""
          try:
            src = subprocess.check_output(
              ["git", "show", "origin/main:app/src/main/res/values/strings.xml"],
              text=True,
              stderr=subprocess.DEVNULL,
            )
            m = re.search(r'<string\s+name="app_name"[^>]*>(.*?)</string>', src, flags=re.S)
            if m:
              app_name = m.group(1)
          except Exception:
            pass

          if not app_name:
            raise SystemExit(0)

          targets = [
            pathlib.Path("app/src/main/res/values/strings.xml"),
            pathlib.Path("app/src/main/res/values-zh-rCN/strings.xml"),
          ]

          for p in targets:
            if not p.exists():
              continue
            txt = p.read_text(encoding="utf-8")
            new_txt, n = re.subn(
              r'(<string\s+name="app_name"[^>]*>)(.*?)(</string>)',
              r'\1' + app_name + r'\3',
              txt,
              count=1,
              flags=re.S,
            )
            if n > 0 and new_txt != txt:
              p.write_text(new_txt, encoding="utf-8")
              print(f"Set app_name in {p} -> {app_name}")
          PY

          echo "${{ steps.check.outputs.up_sha }}" > .upstream-sync-sha
          echo "${{ steps.check.outputs.up_release_id }}" > .upstream-release-id
          echo "${{ steps.check.outputs.up_release_tag }}" > .upstream-release-tag
          git add -A
          # Do not include workflow file updates in auto-build commits, otherwise
          # GITHUB_TOKEN push may be rejected with missing "workflows" permission.
          git reset .github/workflows || true
          if git diff --cached --quiet; then
            echo "No overlay changes to commit."
          else
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "auto-build: sync upstream release ${{ steps.check.outputs.up_release_tag }} (${{ steps.check.outputs.up_sha }})"
          fi
          # Keep build unblocked even if auto-build branch push is not allowed
          # by GITHUB_TOKEN workflow-file restrictions.
          if [[ -n "${{ secrets.GH_PAT }}" ]]; then
            git remote set-url origin "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git"
          fi
          if ! git push origin auto-build --force; then
            echo "::warning::auto-build branch push failed; continue to build APK anyway."
          fi

      - name: Setup JDK
        if: steps.check.outputs.should_build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Setup Android SDK
        if: steps.check.outputs.should_build == 'true'
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        if: steps.check.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          sdkmanager --list > /tmp/sdk-list.txt
          if grep -q "platforms;android-37.0" /tmp/sdk-list.txt; then
            PLATFORM_PKG="platforms;android-37.0"
          elif grep -q "platforms;android-37" /tmp/sdk-list.txt; then
            PLATFORM_PKG="platforms;android-37"
          else
            echo "::error::Neither platforms;android-37.0 nor platforms;android-37 is available in this runner."
            exit 1
          fi
          echo "Using SDK platform package: ${PLATFORM_PKG}"
          sdkmanager "${PLATFORM_PKG}" "build-tools;36.0.0"

      - name: Configure GitHub Packages credentials
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: |
          if [[ -z "${{ secrets.GPR_USER }}" || -z "${{ secrets.GPR_KEY }}" ]]; then
            echo "::error::Missing GPR_USER or GPR_KEY secret. Configure both in repository Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          mkdir -p ~/.gradle
          {
            echo "gpr.user=${{ secrets.GPR_USER }}"
            echo "gpr.key=${{ secrets.GPR_KEY }}"
          } >> ~/.gradle/gradle.properties

      - name: Make gradlew executable
        if: steps.check.outputs.should_build == 'true'
        run: chmod +x ./gradlew

      - name: Build Preview APK
        if: steps.check.outputs.should_build == 'true'
        run: |
          ./gradlew :app:assembleOnlinePreviewRelease -PAPP_ID=com.zanye.installerx -PVERSION_NAME=${{ steps.check.outputs.preview_version_name }} --no-configuration-cache --refresh-dependencies --stacktrace

      - name: Prepare release asset
        id: prepare_release
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH="$(find app/build/outputs/apk/onlinePreview/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [[ -z "$APK_PATH" ]]; then
            echo "::error::No APK found under app/build/outputs/apk/onlinePreview/release."
            exit 1
          fi
          mkdir -p release-assets
          RELEASE_APK="release-assets/InstallerX-${{ steps.check.outputs.up_sha }}.apk"
          cp "$APK_PATH" "$RELEASE_APK"
          echo "apk_path=${RELEASE_APK}" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$RELEASE_APK")" >> "$GITHUB_OUTPUT"

      - name: Publish APK release
        id: publish_release
        if: steps.check.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          tag_name: ${{ steps.check.outputs.build_release_tag }}
          name: InstallerX Auto Preview ${{ steps.check.outputs.preview_version_name }}
          body: |
            Automated APK build for ${{ github.repository }}.

            Upstream release: ${{ steps.check.outputs.up_release_tag }}
            Upstream release page: ${{ steps.check.outputs.up_release_url }}
            Upstream SHA: ${{ steps.check.outputs.up_sha }}
            Preview version: ${{ steps.check.outputs.preview_version_name }}
            Workflow commit: ${{ github.sha }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.prepare_release.outputs.apk_path }}
          fail_on_unmatched_files: true
          prerelease: true

      - name: Notify WeChat via Server酱 (optional)
        if: steps.check.outputs.should_build == 'true' && success()
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          RELEASE_URL: ${{ steps.publish_release.outputs.url }}
          RELEASE_ASSETS_JSON: ${{ steps.publish_release.outputs.assets }}
          APK_NAME: ${{ steps.prepare_release.outputs.apk_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$SERVERCHAN_SENDKEY" ]]; then
            echo "::notice::SERVERCHAN_SENDKEY is not set; build succeeded, so WeChat notification was skipped."
            exit 0
          fi
          if ! {
            APK_URL="$(python3 - <<'PY'
            import json
            import os

            raw = os.environ.get("RELEASE_ASSETS_JSON", "").strip()
            if not raw:
                raise SystemExit("Missing release assets output from publish_release step.")

            assets = json.loads(raw)
            if not assets:
                raise SystemExit("No assets were returned by publish_release step.")

            apk_name = os.environ.get("APK_NAME", "").strip()
            for asset in assets:
                if apk_name and asset.get("name") == apk_name and asset.get("browser_download_url"):
                    print(asset["browser_download_url"])
                    raise SystemExit(0)

            first_url = assets[0].get("browser_download_url", "").strip()
            if not first_url:
                raise SystemExit("Release assets do not include a browser_download_url.")
            print(first_url)
            PY
            )"
            TITLE="InstallerX 自动预览构建成功"
            DESP=$'你的 InstallerX 自动预览构建已完成。\n\n'"仓库: ${{ github.repository }}"$'\n'"上游Release: ${{ steps.check.outputs.up_release_tag }}"$'\n'"预览版本: ${{ steps.check.outputs.preview_version_name }}"$'\n'"上游SHA: ${{ steps.check.outputs.up_sha }}"$'\n'"Release 链接: ${RELEASE_URL}"$'\n'"APK 下载: ${APK_URL}"$'\n'"APK 文件: ${APK_NAME}"
            curl -fsS -X POST "https://sctapi.ftqq.com/${SERVERCHAN_SENDKEY}.send" \
              --data-urlencode "title=${TITLE}" \
              --data-urlencode "desp=${DESP}"
          }; then
            echo "::warning::WeChat notification failed; build and release succeeded, so notification was skipped."
          fi
