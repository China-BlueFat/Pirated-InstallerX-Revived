name: Upstream Auto Build

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if upstream has no new commit"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: upstream-auto-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Decide whether to build
        id: check
        shell: bash
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/wxxsfxyzm/InstallerX-Revived.git || true
          git fetch upstream main
          git fetch origin main
          git fetch origin auto-build || true

          UP_SHA="$(git rev-parse upstream/main)"
          LAST_UP_SHA=""
          if git show origin/auto-build:.upstream-sync-sha >/tmp/upsha.txt 2>/dev/null; then
            LAST_UP_SHA="$(cat /tmp/upsha.txt | tr -d '\r\n')"
          fi

          CHANGED=false
          if [[ "$UP_SHA" != "$LAST_UP_SHA" ]]; then
            CHANGED=true
          fi

          FORCE="${{ github.event.inputs.force_build || 'false' }}"
          SHOULD_BUILD="$CHANGED"
          if [[ "$FORCE" == "true" ]]; then
            SHOULD_BUILD=true
          fi

          echo "up_sha=$UP_SHA" >> "$GITHUB_OUTPUT"
          echo "last_up_sha=$LAST_UP_SHA" >> "$GITHUB_OUTPUT"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "force=$FORCE" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

      - name: Skip summary
        if: steps.check.outputs.should_build != 'true'
        run: |
          echo "No new upstream commit and force_build=false. Skip build."

      - name: Sync auto-build branch from upstream
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B auto-build upstream/main

      - name: Apply your custom files from origin/main
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail

          CUSTOM_PATHS=(
            "apply-local-fix.ps1"
            "app/build.gradle.kts"
            "app/src/main/ic_launcher-playstore.png"
            "app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml"
            "app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml"
            "app/src/main/res/mipmap-hdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-hdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-hdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-mdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-mdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-mdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-xhdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-xhdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-xxhdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-xxhdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-xxxhdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.webp"
            "app/src/main/res/values/ic_launcher_background.xml"
            "app/src/main/res/values/strings.xml"
            "gradle/wrapper/gradle-wrapper.properties"
            "settings.gradle.kts"
            ".github/workflows/upstream-auto-build.yml"
          )

          for p in "${CUSTOM_PATHS[@]}"; do
            if git cat-file -e "origin/main:$p" 2>/dev/null; then
              mkdir -p "$(dirname "$p")"
              git checkout origin/main -- "$p"
            fi
          done

          for p in \
            "app/src/main/res/mipmap-anydpi/ic_launcher.xml" \
            "app/src/main/res/mipmap-anydpi/ic_launcher_round.xml"; do
            if ! git cat-file -e "origin/main:$p" 2>/dev/null; then
              git rm -f --ignore-unmatch "$p" || true
            fi
          done

          echo "${{ steps.check.outputs.up_sha }}" > .upstream-sync-sha
          git add -A
          if git diff --cached --quiet; then
            echo "No overlay changes to commit."
          else
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "auto-build: sync upstream ${{ steps.check.outputs.up_sha }}"
          fi

          git push origin auto-build --force

      - name: Setup JDK
        if: steps.check.outputs.should_build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Setup Android SDK
        if: steps.check.outputs.should_build == 'true'
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        if: steps.check.outputs.should_build == 'true'
        run: |
          sdkmanager "platforms;android-37" "build-tools;36.0.0"

      - name: Configure GitHub Packages credentials
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: |
          mkdir -p ~/.gradle
          {
            echo "gpr.user=${{ secrets.GPR_USER }}"
            echo "gpr.key=${{ secrets.GPR_KEY }}"
          } >> ~/.gradle/gradle.properties

      - name: Build Release APK
        if: steps.check.outputs.should_build == 'true'
        run: |
          ./gradlew :app:assembleOnlineStableRelease --no-configuration-cache --refresh-dependencies

      - name: Upload APK artifact
        if: steps.check.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: InstallerX-${{ steps.check.outputs.up_sha }}
          path: app/build/outputs/apk/onlineStable/release/*.apk
          if-no-files-found: error
