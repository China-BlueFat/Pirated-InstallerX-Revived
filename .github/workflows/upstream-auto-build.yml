name: Upstream Auto Build

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if upstream has no new commit"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: upstream-auto-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}

      - name: Decide whether to build
        id: check
        shell: bash
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/wxxsfxyzm/InstallerX-Revived.git || true
          git fetch upstream main
          git fetch origin main
          git fetch origin auto-build || true

          UP_SHA="$(git rev-parse upstream/main)"
          LAST_UP_SHA=""
          if git show origin/auto-build:.upstream-sync-sha >/tmp/upsha.txt 2>/dev/null; then
            LAST_UP_SHA="$(cat /tmp/upsha.txt | tr -d '\r\n')"
          fi

          CHANGED=false
          if [[ "$UP_SHA" != "$LAST_UP_SHA" ]]; then
            CHANGED=true
          fi

          FORCE="${{ github.event.inputs.force_build || 'false' }}"
          SHOULD_BUILD="$CHANGED"
          if [[ "$FORCE" == "true" ]]; then
            SHOULD_BUILD=true
          fi

          echo "up_sha=$UP_SHA" >> "$GITHUB_OUTPUT"
          echo "last_up_sha=$LAST_UP_SHA" >> "$GITHUB_OUTPUT"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "force=$FORCE" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

      - name: Skip summary
        if: steps.check.outputs.should_build != 'true'
        run: |
          echo "No new upstream commit and force_build=false. Skip build."

      - name: Sync auto-build branch from upstream
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B auto-build upstream/main

      - name: Apply your custom files from origin/main
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail

          CUSTOM_PATHS=(
            "apply-local-fix.ps1"
            "app/build.gradle.kts"
            "app/src/main/ic_launcher-playstore.png"
            "app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml"
            "app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml"
            "app/src/main/res/mipmap-hdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-hdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-hdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-mdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-mdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-mdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-xhdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-xhdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-xxhdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-xxhdpi/ic_launcher_round.webp"
            "app/src/main/res/mipmap-xxxhdpi/ic_launcher.webp"
            "app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.webp"
            "app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.webp"
            "app/src/main/res/values/ic_launcher_background.xml"
            "gradle/wrapper/gradle-wrapper.properties"
            "settings.gradle.kts"
          )

          for p in "${CUSTOM_PATHS[@]}"; do
            if git cat-file -e "origin/main:$p" 2>/dev/null; then
              mkdir -p "$(dirname "$p")"
              git checkout origin/main -- "$p"
            fi
          done

          for p in \
            "app/src/main/res/mipmap-anydpi/ic_launcher.xml" \
            "app/src/main/res/mipmap-anydpi/ic_launcher_round.xml"; do
            if ! git cat-file -e "origin/main:$p" 2>/dev/null; then
              git rm -f --ignore-unmatch "$p" || true
            fi
          done

          # Keep upstream strings.xml (to avoid missing newly added keys),
          # but preserve your custom app_name from origin/main.
          python3 - <<'PY'
          import pathlib
          import re
          import subprocess

          app_name = ""
          try:
            src = subprocess.check_output(
              ["git", "show", "origin/main:app/src/main/res/values/strings.xml"],
              text=True,
              stderr=subprocess.DEVNULL,
            )
            m = re.search(r'<string\s+name="app_name"[^>]*>(.*?)</string>', src, flags=re.S)
            if m:
              app_name = m.group(1)
          except Exception:
            pass

          if not app_name:
            raise SystemExit(0)

          targets = [
            pathlib.Path("app/src/main/res/values/strings.xml"),
            pathlib.Path("app/src/main/res/values-zh-rCN/strings.xml"),
          ]

          for p in targets:
            if not p.exists():
              continue
            txt = p.read_text(encoding="utf-8")
            new_txt, n = re.subn(
              r'(<string\s+name="app_name"[^>]*>)(.*?)(</string>)',
              r'\1' + app_name + r'\3',
              txt,
              count=1,
              flags=re.S,
            )
            if n > 0 and new_txt != txt:
              p.write_text(new_txt, encoding="utf-8")
              print(f"Set app_name in {p} -> {app_name}")
          PY

          echo "${{ steps.check.outputs.up_sha }}" > .upstream-sync-sha
          git add -A
          # Do not include workflow file updates in auto-build commits, otherwise
          # GITHUB_TOKEN push may be rejected with missing "workflows" permission.
          git reset .github/workflows || true
          if git diff --cached --quiet; then
            echo "No overlay changes to commit."
          else
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "auto-build: sync upstream ${{ steps.check.outputs.up_sha }}"
          fi
          # Keep build unblocked even if auto-build branch push is not allowed
          # by GITHUB_TOKEN workflow-file restrictions.
          if [[ -n "${{ secrets.GH_PAT }}" ]]; then
            git remote set-url origin "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git"
          fi
          if ! git push origin auto-build --force; then
            echo "::warning::auto-build branch push failed; continue to build APK anyway."
          fi

      - name: Setup JDK
        if: steps.check.outputs.should_build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Setup Android SDK
        if: steps.check.outputs.should_build == 'true'
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        if: steps.check.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          sdkmanager --list > /tmp/sdk-list.txt
          if grep -q "platforms;android-37.0" /tmp/sdk-list.txt; then
            PLATFORM_PKG="platforms;android-37.0"
          elif grep -q "platforms;android-37" /tmp/sdk-list.txt; then
            PLATFORM_PKG="platforms;android-37"
          else
            echo "::error::Neither platforms;android-37.0 nor platforms;android-37 is available in this runner."
            exit 1
          fi
          echo "Using SDK platform package: ${PLATFORM_PKG}"
          sdkmanager "${PLATFORM_PKG}" "build-tools;36.0.0"

      - name: Configure GitHub Packages credentials
        if: steps.check.outputs.should_build == 'true'
        shell: bash
        run: |
          if [[ -z "${{ secrets.GPR_USER }}" || -z "${{ secrets.GPR_KEY }}" ]]; then
            echo "::error::Missing GPR_USER or GPR_KEY secret. Configure both in repository Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          mkdir -p ~/.gradle
          {
            echo "gpr.user=${{ secrets.GPR_USER }}"
            echo "gpr.key=${{ secrets.GPR_KEY }}"
          } >> ~/.gradle/gradle.properties

      - name: Make gradlew executable
        if: steps.check.outputs.should_build == 'true'
        run: chmod +x ./gradlew

      - name: Build Release APK
        if: steps.check.outputs.should_build == 'true'
        run: |
          ./gradlew :app:assembleOnlineStableRelease --no-configuration-cache --refresh-dependencies

      - name: Upload APK artifact
        id: upload_apk
        if: steps.check.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: InstallerX-${{ steps.check.outputs.up_sha }}
          path: app/build/outputs/apk/onlineStable/release/*.apk
          if-no-files-found: error

      - name: Notify WeChat via Server酱
        if: steps.check.outputs.should_build == 'true' && success()
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload_apk.outputs.artifact-id }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$SERVERCHAN_SENDKEY" ]]; then
            echo "::warning::SERVERCHAN_SENDKEY is not set, skip WeChat notification."
            exit 0
          fi
          TITLE="InstallerX 自动构建成功"
          DESP=$'你的 InstallerX 自动构建已完成。\n\n'"仓库: ${{ github.repository }}"$'\n'"上游SHA: ${{ steps.check.outputs.up_sha }}"$'\n'"Run 链接: ${RUN_URL}"$'\n'"Artifact 链接: ${ARTIFACT_URL}"
          curl -fsS -X POST "https://sctapi.ftqq.com/${SERVERCHAN_SENDKEY}.send" \
            --data-urlencode "title=${TITLE}" \
            --data-urlencode "desp=${DESP}"
